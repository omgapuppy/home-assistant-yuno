name: CI

on:
  pull_request:
  push:
    branches:
      - "codex/**"
      - "feature/**"
      - "fix/**"
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy custom_components tests
      - name: Test
        run: pytest
